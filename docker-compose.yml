services:
  control-luces:
    build: .
    container_name: domotica_hub
    ports:
      - "8085:80"
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=5432
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - ESP32_IP=192.168.100.25
      - OPENWEATHERMAP_API_KEY=${OPENWEATHERMAP_API_KEY}
    restart: always
    networks:
      - dokploy-network
      - default

networks:
  dokploy-network:
    external: true
